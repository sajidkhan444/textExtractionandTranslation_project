version: "3.9"

services:

  api:
    build: .
    container_name: ai_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    expose:
      - "8000"
    restart: unless-stopped

  caddy:
    image: caddy:2
    container_name: ai_caddy
    ports:
      - "8384:8384"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
    depends_on:
      - api
    restart: unless-stopped